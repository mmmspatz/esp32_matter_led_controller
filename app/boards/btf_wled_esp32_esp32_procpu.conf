#
# btf_wled_esp32/esp32/procpu (classic ESP32-WROOM-32E): the RAM diet.
# Merged automatically after prj.conf for this board target only; the
# EXTRA_CONF_FILE variants (rgb/prov) still override where they need to.
#
# Usable DRAM on this SoC is two banks: dram0 ≈ 136K (SRAM2 minus the 56K
# BT-blob reserve) for .bss+.data, and dram1 = 96K which on this port only
# receives .noinit. The build sits at ~99.7% of dram0 — every static
# allocation matters. None of this applies to the ESP32-C6 board, whose
# 512K HP-SRAM is a single unified bank.

# The CHIP heap (chip-patches/0002) and thread stacks live in the second
# DRAM bank via .noinit. This is the default today, but Zephyr 4.4 turns
# it off under MCUboot — pin it so an OTA experiment can't silently
# implode the RAM budget.
CONFIG_ESP32_REGION_1_NOINIT=y

# The sys_heap buffer is relocated to the second DRAM bank
# (chip-patches/0002); 40K is what fits there next to the stacks.
CONFIG_CHIP_MALLOC_SYS_HEAP_SIZE=40960

# Open-key-slot table lives in dram0 .bss (~40 B/slot inside tf-psa-crypto's
# global_data): 64 slots (the NXP default) overflowed dram0 by 808 bytes.
# Slots only bound concurrently-open keys (sessions + handshake ephemerals),
# not stored keys; 32 is ample for 4 fabrics.
CONFIG_MBEDTLS_PSA_KEY_SLOT_COUNT=32

# WiFi driver buffers come out of the kernel pool at runtime; trim to match
# the lowered pool floor (measured in the M1 spike; see also the
# HEAP_MEM_POOL_ADD_SIZE_ESP_* re-defaults in app/Kconfig).
CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=6
CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=16
CONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=16
CONFIG_ESP32_WIFI_AMPDU_TX_ENABLED=n
CONFIG_ESP32_WIFI_AMPDU_RX_ENABLED=n

# The LX6 has a hardware FPU; enable lazy FP context save for the float
# color math. (The C6's rv32imac core has none -- soft-float there.)
CONFIG_FPU=y
