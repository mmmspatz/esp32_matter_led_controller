#
# btf_wled_esp32c6/esp32c6/hpcore (ESP32-C6-WROOM-1-N8 rework): none of the
# classic ESP32's RAM diet applies. HP-SRAM is a single unified 512K bank
# with no BT-controller carve-out, so the kernel heap floor, WiFi driver
# buffers, PSA key-slot table and net bufs all keep their stock defaults,
# and the BT-DRAM reclaim machinery compiles out (SOC_SERIES_ESP32 gate).
#
# Everything here is INITIAL sizing, unverified on hardware -- re-measure
# at bring-up.

# The chip-module default is 12K, sized for nRF-class devices that also
# have a libc heap; here sys_heap is the only allocator (--wrap=malloc,
# COMMON_LIBC_MALLOC=n) and serves CHIP + OTA + TLS. 96K is a generous
# first cut of the ~170K left after static data and the radio heap pools.
CONFIG_CHIP_MALLOC_SYS_HEAP_SIZE=98304

# No CONFIG_FPU here: the rv32imac core has none, and with CPU_HAS_FPU=n
# the symbol is invisible (assignments would be ignored with a warning).
# app/Kconfig's guarded re-default keeps chip-module's blanket
# "FPU default y" from applying; float color math soft-floats.
