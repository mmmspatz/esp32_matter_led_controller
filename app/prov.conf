#
# Provisioning build variant:
#   west build -b btf_wled_esp32/esp32/procpu app -- -DEXTRA_CONF_FILE=prov.conf
#
# Adds a UART shell with the matter_prov commands. The shell does not fit
# the production image's RAM budget, so provisioning is: flash this image,
# run scripts/provision.py, flash the production image. The chip-fct
# settings written here live in the storage partition, which reflashing
# does not touch.

CONFIG_SHELL=y
CONFIG_LEDCTRL_PROV_SHELL=y

# No commissioning happens on the provisioning image; dropping BT frees
# the 56K controller DRAM reserve, which pays for the shell many times
# over.
CONFIG_BT=n

# Slim the shell: no history/completion/colors, small stacks/buffers.
CONFIG_SHELL_STACK_SIZE=2560
CONFIG_SHELL_HISTORY=n
CONFIG_SHELL_TAB=n
CONFIG_SHELL_WILDCARD=n
CONFIG_SHELL_VT100_COLORS=n
CONFIG_SHELL_CMDS=n
CONFIG_DEVICE_SHELL=n
CONFIG_DEVMEM_SHELL=n
# base64 verifier makes the set command ~230 chars
CONFIG_SHELL_CMD_BUFF_SIZE=320
CONFIG_SHELL_BACKEND_SERIAL_RX_RING_BUFFER_SIZE=512

# Make room: shell thread stack lives in the second DRAM bank alongside
# the CHIP heap; shrink the heap slightly for this bench-only image.
CONFIG_CHIP_MALLOC_SYS_HEAP_SIZE=36864
