CONFIG_CHIP=y
CONFIG_CHIP_WIFI=y
# Off by default even with CHIP_WIFI, yet it compile-time-gates the WiFi
# command set of the NetworkCommissioning cluster: without it the device
# rejects AddOrUpdateWiFiNetwork with UNSUPPORTED_COMMAND and every
# commissioner fails right after credential installation.
CONFIG_CHIP_ENABLE_WIFI_STATION=y
CONFIG_CHIP_PROJECT_CONFIG="include/CHIPProjectConfig.h"
CONFIG_CHIP_DEVICE_VENDOR_NAME="mmmspatz"
CONFIG_CHIP_DEVICE_PRODUCT_ID=32773
CONFIG_CHIP_DEVICE_PRODUCT_NAME="LED Strip Controller"
CONFIG_CHIP_DEVICE_HARDWARE_VERSION=1
CONFIG_CHIP_DEVICE_HARDWARE_VERSION_STRING="btf-wled-esp32"
CONFIG_STD_CPP17=y

# Kconfig.defaults landmine override: Thread-biased default, wrong for WiFi.
CONFIG_NET_L2_OPENTHREAD=n

# Matter OTA over WiFi. Requires MCUboot (see sysbuild.conf): the CHIP Zephyr
# image processor streams to slot1 and applies via boot_request_upgrade.
CONFIG_CHIP_OTA_REQUESTOR=y
# Overwrite-only MCUboot has no test/confirm cycle, so mark applied images
# permanent (the UPGRADE_TEST default's revert path never fires here).
CONFIG_CHIP_OTA_REQUEST_UPGRADE_PERMANENT=y
# The integer the requestor compares against a provider's .ota header; bump
# per released image. String is cosmetic (BasicInformation.SoftwareVersionString).
CONFIG_CHIP_DEVICE_SOFTWARE_VERSION=4
CONFIG_CHIP_DEVICE_SOFTWARE_VERSION_STRING="0.0.4"
# The image processor's apply/download path (not auto-enabled on the generic
# Zephyr platform): MCUBOOT_IMG_MANAGER provides boot_request_upgrade/
# boot_write_img_confirmed/mcuboot_swap_type; IMG_MANAGER needs STREAM_FLASH,
# which provides stream_flash_init/buffered_write for the slot1 writer.
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y

# Zephyr WiFi (drivers/wifi/esp32 implements wifi_mgmt; forces !SMP)
CONFIG_WIFI=y
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
# chip-module's Kconfig.defaults disables the neighbor cache (sane for
# Thread, wrong for WiFi): CHIP's own WiFiManager needs router
# solicitation (net_if_start_rs), which needs full neighbor discovery.
CONFIG_NET_IPV6_NBR_CACHE=y
CONFIG_NET_IPV6_ND=y
CONFIG_NET_IF_MCAST_IPV6_ADDR_COUNT=5
# CHIP's DiagnosticDataProviderImplWiFi requires the WiFi stats mgmt API
CONFIG_NET_STATISTICS=y
CONFIG_NET_STATISTICS_WIFI=y
CONFIG_NET_STATISTICS_USER_API=y

# BLE for commissioning (CHIPoBLE)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="LEDStrip"
# CHIPoBLE GATT callbacks run on the (default) dedicated BT RX workqueue;
# Zephyr's 1200-byte default overflows there.
CONFIG_BT_RX_STACK_SIZE=4096
# CHIPoBLE registers/unregisters its GATT service at runtime
CONFIG_BT_GATT_DYNAMIC_DB=y

# Matter storage (fabrics, WiFi creds, chip-fct provisioning keys)
CONFIG_SETTINGS=y
CONFIG_NVS=y

# Crypto: CHIP's PSA backend against Zephyr 4.4's mbedTLS 4.x +
# TF-PSA-Crypto split (the legacy MBEDTLS_*_C Kconfig surface is gone).
# ECDSA/ECDH/P-256/CCM/HKDF/SHA-256 PSA_WANTs arrive via CHIP_CRYPTO_PSA
# implies; SPAKE2+ stays on the mbedTLS backend (chip_crypto_spake2p
# choice default) because TF-PSA-Crypto has no PSA_WANT_ALG_SPAKE2P_MATTER.
CONFIG_CHIP_CRYPTO_PSA=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=8192
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_IMPORT=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y
CONFIG_PSA_WANT_KEY_TYPE_HMAC=y
# SPAKE2+ fallback needs mbedTLS private struct access (CHIP #71479)
CONFIG_MBEDTLS_DECLARE_PRIVATE_IDENTIFIERS=y
# ...and the legacy MD dispatch layer (mbedtls_md_info_from_type in
# CHIPCryptoPALPSA's Spake2p InitInternal); still a real option in 4.4's
# Kconfig.tf-psa-crypto despite the MBEDTLS_*_C purge elsewhere.
CONFIG_MBEDTLS_MD_C=y
# Fast reduction for the NIST P-256 prime field. Default-off here, which left
# CASE Sigma2 (~3 P-256 scalar-mults) at ~2.1 s of pure-software big-integer
# reduction on this ESP32 (no ECC HW accelerator; SOC_ECDSA/ECC_SUPPORTED unset,
# and the MPI accelerator can't hook tf-psa-crypto's bignum) — the bottleneck
# behind Matter session-establishment saturation (see the case-saturation memo).
# Flash-only cost (~1-2K .text in tf-psa-crypto ecp_curves.c), no dram0 hit.
CONFIG_MBEDTLS_ECP_NIST_OPTIM=y
# PSA ITS backend for operational keys (settings-backed)
CONFIG_SECURE_STORAGE=y

# No CONFIG_THREAD_LOCAL_STORAGE: xtensa has no ARCH_HAS_THREAD_LOCAL_STORAGE,
# so the old =y never took effect (verified in the 4.3 build's .config);
# Zephyr 4.4's Kconfig makes such no-op assignments fatal. CHIP's own
# CHIP_SYSTEM_THREAD_LOCAL_STORAGE handles what it needs.

CONFIG_CHIP_ENABLE_PAIRING_AUTOSTART=y
CONFIG_CHIP_BLE_EXT_ADVERTISING=y
CONFIG_CHIP_BLE_ADVERTISING_DURATION=60

# getopt collision between newlib-nano and Zephyr shell (hispidin postmortem)
CONFIG_CHIP_LIB_SHELL=n

CONFIG_LOG=y
# Minimal (synchronous) logging: no ring buffer, no processing thread.
# Costs log-call latency, saves ~4K DRAM; revisit if timing artifacts show.
CONFIG_LOG_MODE_MINIMAL=y

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096

# --- RAM diet (sized for the classic ESP32's dram0; see AGENTS.md) ---
# SoC-specific knobs (dram0 bank juggling, WiFi driver buffer trims, PSA
# key-slot table size, CHIP heap size) live in boards/<board>.conf.
#
# All runtime allocation goes through CHIP's sys_heap allocator, which
# overrides malloc/free globally via --wrap (on the classic ESP32 its
# buffer is additionally relocated to the second DRAM bank via
# chip-patches/0002). One allocator on every board: the common libc
# malloc arena would otherwise initialize with whatever is left over
# (~0 bytes on the ESP32, panicking at boot).
CONFIG_CHIP_MALLOC_SYS_HEAP=y
CONFIG_COMMON_LIBC_MALLOC=n
# Shell off until the provisioning CLI lands (M5)
CONFIG_SHELL=n
# chip-module defaults 80/80 net_bufs (~25K); Matter-over-WiFi runs on far
# fewer. Revisit if pkt drops appear under load.
CONFIG_NET_BUF_RX_COUNT=36
CONFIG_NET_BUF_TX_COUNT=36
CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
# Matter uses ~6 UDP contexts (mDNS, operational, DHCP); default 10
CONFIG_NET_MAX_CONTEXTS=8

# LED drive
CONFIG_PWM=y
CONFIG_GPIO=y
CONFIG_FPU=y
