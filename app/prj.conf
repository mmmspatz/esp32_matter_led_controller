CONFIG_CHIP=y
CONFIG_CHIP_WIFI=y
# Off by default even with CHIP_WIFI, yet it compile-time-gates the WiFi
# command set of the NetworkCommissioning cluster: without it the device
# rejects AddOrUpdateWiFiNetwork with UNSUPPORTED_COMMAND and every
# commissioner fails right after credential installation.
CONFIG_CHIP_ENABLE_WIFI_STATION=y
CONFIG_CHIP_PROJECT_CONFIG="include/CHIPProjectConfig.h"
CONFIG_CHIP_DEVICE_VENDOR_NAME="mmmspatz"
CONFIG_CHIP_DEVICE_PRODUCT_ID=32773
CONFIG_CHIP_DEVICE_PRODUCT_NAME="LED Strip Controller"
CONFIG_CHIP_DEVICE_HARDWARE_VERSION=1
CONFIG_CHIP_DEVICE_HARDWARE_VERSION_STRING="btf-wled-esp32"
CONFIG_STD_CPP17=y

# Kconfig.defaults landmine overrides: this is a WiFi device with no OTA
# path (single usable slot in the MVP; see partition table).
CONFIG_NET_L2_OPENTHREAD=n
CONFIG_CHIP_OTA_REQUESTOR=n

# Zephyr WiFi (drivers/wifi/esp32 implements wifi_mgmt; forces !SMP)
CONFIG_WIFI=y
CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
# chip-module's Kconfig.defaults disables the neighbor cache (sane for
# Thread, wrong for WiFi): CHIP's own WiFiManager needs router
# solicitation (net_if_start_rs), which needs full neighbor discovery.
CONFIG_NET_IPV6_NBR_CACHE=y
CONFIG_NET_IPV6_ND=y
CONFIG_NET_IPV4=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_IF_MCAST_IPV6_ADDR_COUNT=5
# CHIP's DiagnosticDataProviderImplWiFi requires the WiFi stats mgmt API
CONFIG_NET_STATISTICS=y
CONFIG_NET_STATISTICS_WIFI=y
CONFIG_NET_STATISTICS_USER_API=y

# BLE for commissioning (CHIPoBLE)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="LEDStrip"
# CHIPoBLE GATT callbacks run on the (default) dedicated BT RX workqueue;
# Zephyr's 1200-byte default overflows there.
CONFIG_BT_RX_STACK_SIZE=4096
# CHIPoBLE registers/unregisters its GATT service at runtime
CONFIG_BT_GATT_DYNAMIC_DB=y

# Matter storage (fabrics, WiFi creds, chip-fct provisioning keys)
CONFIG_SETTINGS=y
CONFIG_NVS=y

# mbedTLS features for CHIP's crypto backend. This is the intent of CHIP's
# (unsourced) config/zephyr/chip-module/Kconfig.mbedtls, restated with
# Zephyr 4.3's non-deprecated symbol names — the original sets
# MBEDTLS_CTR_DRBG_ENABLED/MBEDTLS_ENTROPY_ENABLED, which are deprecated
# and would turn fatal under strict Kconfig.
CONFIG_MBEDTLS=y
# BT_HOST_CRYPTO (default y on this SoC) selects PSA_CRYPTO, which
# defaults mbedTLS's PK/X509/MD layers onto PSA glue that isn't compiled
# without PSA_WANT_ALG_ECDSA etc. CHIP's crypto backend uses the legacy
# mbedTLS APIs; keep PSA for the BT host only.
CONFIG_MBEDTLS_USE_PSA_CRYPTO=n
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=8192
CONFIG_MBEDTLS_ENTROPY_C=y
CONFIG_MBEDTLS_ENTROPY_POLL_ZEPHYR=y
CONFIG_MBEDTLS_MD_C=y
CONFIG_MBEDTLS_CTR_DRBG_C=y
CONFIG_MBEDTLS_ECP_C=y
CONFIG_MBEDTLS_ECP_DP_SECP256R1_ENABLED=y
CONFIG_MBEDTLS_ECDH_C=y
CONFIG_MBEDTLS_ECDSA_C=y
CONFIG_MBEDTLS_PKCS5_C=y
CONFIG_MBEDTLS_HKDF_C=y
CONFIG_MBEDTLS_CIPHER_AES_ENABLED=y
CONFIG_MBEDTLS_CIPHER_CCM_ENABLED=y
CONFIG_MBEDTLS_PK_WRITE_C=y
CONFIG_MBEDTLS_X509_CSR_WRITE_C=y

# CHIP uses thread_local
CONFIG_THREAD_LOCAL_STORAGE=y

CONFIG_CHIP_ENABLE_PAIRING_AUTOSTART=y
CONFIG_CHIP_BLE_EXT_ADVERTISING=y
CONFIG_CHIP_BLE_ADVERTISING_DURATION=60

# getopt collision between newlib-nano and Zephyr shell (hispidin postmortem)
CONFIG_CHIP_LIB_SHELL=n

CONFIG_LOG=y
# Minimal (synchronous) logging: no ring buffer, no processing thread.
# Costs log-call latency, saves ~4K DRAM; revisit if timing artifacts show.
CONFIG_LOG_MODE_MINIMAL=y

CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=4096

# --- RAM diet (dram0_0_seg is the scarce resource; see AGENTS.md) ---
# The CHIP heap (chip-patches/0002) and thread stacks live in the second
# DRAM bank via .noinit. This is the default today, but Zephyr 4.4 turns
# it off under MCUboot — pin it so an OTA experiment can't silently
# implode the RAM budget.
CONFIG_ESP32_REGION_1_NOINIT=y
# All runtime allocation goes through CHIP's sys_heap allocator, whose
# buffer is relocated to the second DRAM bank (chip-patches/0002) and
# which overrides malloc/free globally via --wrap. The common libc
# malloc arena would otherwise initialize with the ~0 bytes left in
# dram0 and panic at boot.
CONFIG_CHIP_MALLOC_SYS_HEAP=y
CONFIG_CHIP_MALLOC_SYS_HEAP_SIZE=40960
CONFIG_COMMON_LIBC_MALLOC=n
# Shell off until the provisioning CLI lands (M5)
CONFIG_SHELL=n
# chip-module defaults 80/80 net_bufs (~25K); Matter-over-WiFi runs on far
# fewer. Revisit if pkt drops appear under load.
CONFIG_NET_BUF_RX_COUNT=36
CONFIG_NET_BUF_TX_COUNT=36
CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
# Matter uses ~6 UDP contexts (mDNS, operational, DHCP); default 10
CONFIG_NET_MAX_CONTEXTS=8
# WiFi driver buffers come out of the kernel pool at runtime; trim to match
# the lowered pool floor (measured in the M1 spike).
CONFIG_ESP32_WIFI_STATIC_RX_BUFFER_NUM=6
CONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=16
CONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=16
CONFIG_ESP32_WIFI_AMPDU_TX_ENABLED=n
CONFIG_ESP32_WIFI_AMPDU_RX_ENABLED=n

# LED drive
CONFIG_PWM=y
CONFIG_GPIO=y
CONFIG_FPU=y
