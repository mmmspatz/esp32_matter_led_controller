# MCUboot image overlay: ECDSA-P256 signature verification.
#
# The signature TYPE (ECDSA_P256) is set in sysbuild.conf and propagated to this
# image; here we pick the verify IMPLEMENTATION. Default is tinycrypt, which
# collides with the mbedTLS/PSA the ESP32 platform force-includes ("One crypto
# library implementation allowed at a time"), so use the PSA backend.
CONFIG_BOOT_ECDSA_PSA=y

# BOOT_ECDSA_PSA is under-specified upstream (MCUboot v2.4.0): unlike
# BOOT_ED25519_PSA it does NOT select MBEDTLS_PSA_CRYPTO_C or MBEDTLS_ENABLE_HEAP.
# Supply both. The heap is load-bearing: the esp32_procpu SoC overlay sets
# COMMON_LIBC_MALLOC_ARENA_SIZE=0, so without a dedicated mbedTLS heap the PSA
# ECC verify's mbedtls_calloc hits a zero-size arena and the bootloader wedges
# (the "hang in bootutil_verify_sig" from the earlier expedition). Sized to match
# BOOT_RSA_PSA's default. Paired with mcuboot-patches/0001 (psa_crypto_init).
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=8192
CONFIG_MBEDTLS_ASN1_PARSE_C=y
