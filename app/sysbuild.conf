# Sysbuild config: build MCUboot as the second-stage bootloader so the CHIP
# Zephyr OTA image processor (slot1 stream_flash + boot_request_upgrade) has a
# bootloader that can switch slots. Setting BOOTLOADER_MCUBOOT propagates
# CONFIG_BOOTLOADER_MCUBOOT=y into the app image, which auto-disables
# ESP_SIMPLE_BOOT.
SB_CONFIG_BOOTLOADER_MCUBOOT=y

# Overwrite-only: the 4M partition table has no scratch, and the Espressif
# esp32_procpu MCUboot overlay forces BOOT_UPGRADE_ONLY=y. The ESP32 sysbuild
# mode default is swap-using-move, so pin overwrite-only explicitly to keep the
# app-side mode aligned with the bootloader. (No auto-revert; bad image = USB
# reflash. Swap-with-rollback is a deliberate later step.)
SB_CONFIG_MCUBOOT_MODE_OVERWRITE_ONLY=y

# Image signing: RSA-2048. MCUboot validates the secondary slot's signature
# before swapping, so the OTA image (and slot0) must be signed with this key.
# sysbuild's BOOTLOADER_image_default.cmake force-sets the MCUboot image's
# CONFIG_BOOT_SIGNATURE_TYPE_* from this SB symbol (it overrides the
# esp32_procpu.conf overlay — leaving it default also lands on RSA-2048).
#
# Why RSA, not ECDSA-P256: ECDSA-P256 on this ESP32 + Zephyr 4.4 (tf-psa-crypto) +
# MCUboot stack HANGS in bootutil_verify_sig at boot (builds + transports fine,
# but the bootloader wedges verifying the EC signature — see the ota-ecdsa-
# expedition memory). RSA-via-mbedTLS uses a different, working verify path.
#
# The private key lives in the gitignored keys/ (like devices/); BACK IT UP —
# once this MCUboot is flashed, its embedded public key is fixed, so losing the
# key means the board can only be updated via USB reflash. Not Secure Boot: this
# authenticates the OTA delivery path, not against physical/flash tampering.
SB_CONFIG_BOOT_SIGNATURE_TYPE_RSA=y
# ${WEST_TOPDIR} is expanded by string(CONFIGURE) in both the app and mcuboot
# key-file resolution, yielding an absolute path both images accept (a plain
# relative path resolves differently per image). Keeps this file machine-portable.
SB_CONFIG_BOOT_SIGNATURE_KEY_FILE="${WEST_TOPDIR}/keys/ota-signing-rsa2048.pem"
