manifest:
  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos

  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      # v4.3.0 is the newest Zephyr whose mbedTLS packaging (monolithic 3.x)
      # connectedhomeip can build against. Zephyr v4.4 split the module into
      # mbedtls 4.x + tf-psa-crypto, which CHIP's legacy-mbedTLS crypto
      # backend does not follow. Revisit alongside CONFIG_CHIP_CRYPTO_PSA.
      revision: v4.3.0
      import:
        # Only pull the modules we actually build against.
        name-allowlist:
          - hal_espressif   # ESP32 HAL, WiFi/BT blobs, esptool west runner
          - mbedtls         # crypto for CHIP and the WiFi driver
          - picolibc        # libc
          - openthread      # never compiled (CONFIG_NET_L2_OPENTHREAD=n), but
                            # CHIP's chip-module declares a hard module
                            # dependency on it
          - mcuboot         # unused by the MVP (simple boot); staged for OTA

    - name: connectedhomeip
      url: https://github.com/project-chip/connectedhomeip
      path: modules/connectedhomeip
      # Master pin, not a release: v1.5.x's platform/Zephyr still uses BLE
      # advertising flags that were removed in Zephyr 4.x. This SHA is the
      # combination proven against Zephyr v4.3.0 by the hispidin project.
      revision: 79b07ebe6b1bf6f2da7be6cb6693466351fb5a07
      # CHIP's submodules are managed by its own scripts/checkout_submodules.py
      # (see bootstrap.sh), not by west.
      submodules: false
